<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UltraHuman Social</title>
  <meta name="description" content="Social trainingen van UltraHuman." />
  <meta http-equiv="refresh" content="0; url=/social-trainingen.html" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dosis:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f8f5ef;
      --card: #ffffff;
      --text: #1b1a18;
      --muted: #6b655c;
      --accent: #c9a227;
      --accent-hover: #b08d1f;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Montserrat", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #ffe8d5 0%, transparent 35%),
        radial-gradient(circle at 90% 90%, #f9dcc4 0%, transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
      padding: 28px;
      border: 1px solid #efe7dc;
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Dosis", "Montserrat", sans-serif;
      font-size: clamp(1.3rem, 2vw, 1.8rem);
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      padding: 12px 14px;
      border-radius: 10px;
      font-weight: 700;
      border: 1px solid var(--accent);
    }

    .btn:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>UltraHuman Social</h1>
    <p>Je wordt doorgestuurd naar de social trainingen module.</p>
    <a class="btn" href="/social-trainingen.html">Open Social Trainingen</a>
  </main>
</body>
</html>
