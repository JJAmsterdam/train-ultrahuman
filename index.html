<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ultrahuman Social</title>
  <meta name="description" content="Alle belangrijke links van Ultrahuman op een plek." />
  <style>
    :root {
      --bg: #f8f5ef;
      --card: #ffffff;
      --text: #1b1a18;
      --muted: #6b655c;
      --accent: #ef6c42;
      --accent-hover: #d95a31;
      --ring: #f2d4ca;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #ffe8d5 0%, transparent 35%),
        radial-gradient(circle at 90% 90%, #f9dcc4 0%, transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
      padding: 28px;
      border: 1px solid #efe7dc;
    }

    .top {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #f2ede3;
      font-size: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 2.2vw, 1.9rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .link {
      display: block;
      text-decoration: none;
      background: #fff;
      color: var(--text);
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #ece3d5;
      font-weight: 600;
      transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
    }

    .link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
      border-color: var(--ring);
    }

    .link.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .link.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .foot {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="top">
      <div class="avatar" aria-hidden="true">UH</div>
      <div>
        <h1>Ultrahuman</h1>
        <p class="subtitle">Alle links die je zoekt, op een centrale social-pagina.</p>
      </div>
    </section>

    <section class="links" aria-label="Belangrijke links">
      <a class="link primary" href="/social-trainingen.html">Social Trainingen Module</a>
      <a class="link primary" href="https://train.ultrahuman.nl" target="_blank" rel="noopener">Trainingskalender Koning van Spanje</a>
      <a class="link" href="https://ultrahuman.nl" target="_blank" rel="noopener">Website ultrahuman.nl</a>
      <a class="link" href="https://instagram.com/" target="_blank" rel="noopener">Instagram profiel</a>
      <a class="link" href="mailto:info@ultrahuman.nl">Contact via e-mail</a>
    </section>

    <p class="foot">Tip: vervang de links hierboven met je definitieve URL's.</p>
  </main>
</body>
</html>
