<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kalender Koning van Spanje</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dosis:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f6f2ea;
      --card: #fffaf2;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e6ddcf;
      --accent: #0f766e;
      --good: #22c55e;
      --neutral: #f59e0b;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top right, #efe7d8, var(--bg) 45%);
      color: var(--ink);
      font-family: "Montserrat", "Segoe UI", sans-serif;
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 18px 14px 124px;
    }
    .hero, .week {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    }
    .hero {
      padding: 16px;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
      font-family: "Dosis", "Montserrat", sans-serif;
    }
    .sub {
      color: var(--muted);
      margin: 4px 0;
      font-size: 0.96rem;
    }
    .sync-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .sync-input {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      width: 180px;
      font: inherit;
    }
    .sync-btn {
      min-height: 40px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
      font-weight: 700;
    }
    .sync-note {
      width: 100%;
      color: var(--muted);
      font-size: 0.86rem;
      min-height: 1.2em;
    }
    .week {
      padding: 12px;
      margin: 10px 0;
    }
    .week h2 {
      margin: 0 0 10px;
      font-size: 1.1rem;
      color: #0b3f3a;
      font-family: "Dosis", "Montserrat", sans-serif;
    }
    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin: 8px 0;
      background: #fffefb;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .check {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }
    .label {
      flex: 1 1 320px;
      line-height: 1.35;
      font-size: 0.97rem;
    }
    .done .label {
      text-decoration: line-through;
      color: #667085;
    }
    .moods {
      display: inline-flex;
      gap: 6px;
      flex: 0 0 auto;
    }
    .mood {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: 0.95rem;
      line-height: 1;
      opacity: 0.75;
    }
    .mood.active.bad {
      border-color: var(--bad);
      background: #fee2e2;
      opacity: 1;
    }
    .mood.active.neutral {
      border-color: var(--neutral);
      background: #fef3c7;
      opacity: 1;
    }
    .mood.active.good {
      border-color: var(--good);
      background: #dcfce7;
      opacity: 1;
    }
    .note-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .note-btn.has-note {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 20;
    }
    .modal.open { display: flex; }
    .sheet {
      width: min(560px, 100%);
      background: #fff;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      padding: 14px;
    }
    .sheet h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px;
      font: inherit;
    }
    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid #d1d5db;
      background: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.92rem;
    }
    .btn.primary {
      background: #0f766e;
      color: #fff;
      border-color: #0f766e;
    }
    .btn.danger {
      background: #fff1f2;
      border-color: #fecdd3;
      color: #be123c;
    }
    .foot {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .progress-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 15;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
      background: rgba(255, 250, 242, 0.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(4px);
    }
    .progress-inner {
      max-width: 920px;
      margin: 0 auto;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--ink);
      font-size: 0.9rem;
      margin-bottom: 6px;
      gap: 10px;
    }
    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f59e0b, #22c55e);
      transition: width 240ms ease;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Kalender Koning van Spanje</h1>
      <p class="sub"><strong>Race:</strong> zaterdag 9 mei 2026 - Koning van Spanje Trail 85 km</p>
      <p class="sub">Vink trainingen af, kies per training een smiley en voeg notities toe.</p>
      <div class="sync-row">
        <input id="syncCode" class="sync-input" type="text" inputmode="numeric" maxlength="6" placeholder="Sync code (6 cijfers)" />
        <button id="syncLoadBtn" class="sync-btn" type="button">Cloud laden</button>
        <div id="syncNote" class="sync-note"></div>
      </div>
    </div>

    <div id="weeks"></div>

    <p class="foot">Alles wordt lokaal op je toestel opgeslagen (browseropslag).</p>
  </div>

  <div class="progress-dock" aria-live="polite">
    <div class="progress-inner">
      <div class="progress-meta">
        <span>Voortgang tot race</span>
        <strong id="progressPct">0%</strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="noteModal" aria-hidden="true">
    <div class="sheet">
      <h3 id="noteTitle">Notitie</h3>
      <textarea id="noteText" placeholder="Schrijf hier je notitie..."></textarea>
      <div class="actions">
        <button class="btn" id="cancelNote" type="button">Sluiten</button>
        <button class="btn danger" id="clearNote" type="button">Wis notitie</button>
        <button class="btn primary" id="saveNote" type="button">Opslaan</button>
      </div>
    </div>
  </div>

  <script>
    const MODULE_KEY = "train";
    const SUPABASE_URL = 'https://cbyoimkzhtgkxccohcpu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_E7eKE6jM8nFSjhCjBOggvQ_aI3SyK7S';
    const SUPABASE_TABLE = 'training_configs';
    const schedule = [
      {
        title: "Week 14 (ma 30 mrt - zo 5 apr)",
        items: [
          { id: "w14-do", text: "Donderdag: 5 km rustig" },
          { id: "w14-za", text: "Zaterdag: 12 km rustig" }
        ]
      },
      {
        title: "Week 15 (ma 6 apr - zo 12 apr)",
        items: [
          { id: "w15-ma", text: "Maandag: 8 km rustig" },
          { id: "w15-wo-do", text: "Woensdag of donderdag (±10 km): 2 km inlopen + 4 x 5 min heuvelop stevig + rustig terug + 2 km uitlopen" },
          { id: "w15-za", text: "Zaterdag: 22 tot 24 km" }
        ]
      },
      {
        title: "Week 16 (ma 13 apr - zo 19 apr)",
        items: [
          { id: "w16-ma", text: "Maandag: 8 km rustig" },
          { id: "w16-wo-do", text: "Woensdag of donderdag (±11 tot 12 km): 2 km inlopen + 3 x 10 min tempo + 3 min rustig + 2 km uitlopen" },
          { id: "w16-za", text: "Zaterdag: 26 tot 28 km" }
        ]
      },
      {
        title: "Week 17 (ma 20 apr - zo 26 apr) - Piekweek",
        items: [
          { id: "w17-ma", text: "Maandag: 8 km rustig" },
          { id: "w17-wo-do", text: "Woensdag of donderdag (±10 km): 2 km inlopen + 8 x 3 min klimmen + rustig naar beneden + 2 km uitlopen" },
          { id: "w17-za", text: "Zaterdag: 30 tot 32 km" },
          { id: "w17-zo", text: "Zondag: 20 tot 24 km" }
        ]
      },
      {
        title: "Week 18 (ma 27 apr - zo 3 mei) - Taper 1",
        items: [
          { id: "w18-ma", text: "Maandag: 6 tot 7 km rustig" },
          { id: "w18-wo-do", text: "Woensdag of donderdag (±8 tot 9 km): 2 km inlopen + 2 x 8 min tempo + 3 min rustig + 2 km uitlopen" },
          { id: "w18-za", text: "Zaterdag: 20 km rustig" },
          { id: "w18-zo", text: "Zondag: 12 km rustig" }
        ]
      },
      {
        title: "Week 19 (ma 4 mei - zo 10 mei) - Wedstrijdweek",
        items: [
          { id: "w19-ma", text: "Maandag: 6 km rustig" },
          { id: "w19-wo-do", text: "Woensdag of donderdag (±7 tot 8 km): 2 km inlopen + 2 x 5 min tempo + 3 min rustig + 2 km uitlopen" },
          { id: "w19-za-race", text: "Zaterdag 9 mei - RACEDAY: 🏁 Koning van Spanje 85 km" }
        ]
      }
    ];

    const stateKey = "kalender-koning-van-spanje-v1";
    const syncCodeKey = "kalender-koning-van-spanje-sync-code";
    let state = loadState();
    let syncCode = loadSyncCode();
    let pushTimer = null;
    let currentNoteId = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(stateKey);
        return raw ? JSON.parse(raw) : {};
      } catch (_) {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(stateKey, JSON.stringify(state));
      queueCloudPush();
    }

    function loadSyncCode() {
      try {
        return sanitizeSyncCode(localStorage.getItem(syncCodeKey) || "");
      } catch (_) {
        return "";
      }
    }

    function saveSyncCode() {
      localStorage.setItem(syncCodeKey, syncCode);
    }

    function sanitizeSyncCode(value) {
      return String(value || "").replace(/\D/g, "").slice(0, 6);
    }

    function isValidSyncCode(value) {
      return /^\d{6}$/.test(String(value || ""));
    }

    function hasSupabaseSync() {
      return Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);
    }

    function getProfileKey() {
      return `ultrahuman-${MODULE_KEY}-${sanitizeSyncCode(syncCode)}`;
    }

    function setSyncNote(message, ok = false) {
      const el = document.getElementById("syncNote");
      el.textContent = ok ? `✓ ${message}` : message;
      el.style.color = ok ? "#247f4d" : "var(--muted)";
    }

    async function pushStateToCloud() {
      if (!hasSupabaseSync()) return false;
      if (!isValidSyncCode(syncCode)) return false;
      const payload = [{
        profile_key: getProfileKey(),
        payload: { state }
      }];
      const resp = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?on_conflict=profile_key`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          Prefer: "resolution=merge-duplicates"
        },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) throw new Error("Push mislukt");
      return true;
    }

    async function pullStateFromCloud(showMessage = false) {
      if (!hasSupabaseSync()) return false;
      if (!isValidSyncCode(syncCode)) return false;

      const key = encodeURIComponent(getProfileKey());
      const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=payload&profile_key=eq.${key}&limit=1`;
      const resp = await fetch(url, {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      if (!resp.ok) throw new Error("Pull mislukt");
      const rows = await resp.json();
      if (!Array.isArray(rows) || rows.length === 0 || !rows[0].payload || !rows[0].payload.state) {
        if (showMessage) setSyncNote("Nog geen clouddata voor deze sync code.");
        return false;
      }
      state = rows[0].payload.state;
      saveState();
      render();
      if (showMessage) setSyncNote("Clouddata geladen.", true);
      return true;
    }

    function queueCloudPush() {
      if (!hasSupabaseSync() || !isValidSyncCode(syncCode)) return;
      clearTimeout(pushTimer);
      pushTimer = setTimeout(async () => {
        try {
          await pushStateToCloud();
          setSyncNote("Wijzigingen gesynchroniseerd.", true);
        } catch (_) {
          setSyncNote("Lokaal opgeslagen, cloud sync tijdelijk mislukt.");
        }
      }, 500);
    }

    function getItemState(id) {
      if (!state[id]) {
        state[id] = { checked: false, mood: "", note: "" };
      }
      return state[id];
    }

    function render() {
      const syncInput = document.getElementById("syncCode");
      if (syncInput) syncInput.value = syncCode;
      const root = document.getElementById("weeks");
      root.innerHTML = "";

      schedule.forEach((week) => {
        const w = document.createElement("section");
        w.className = "week";

        const h2 = document.createElement("h2");
        h2.textContent = week.title;
        w.appendChild(h2);

        week.items.forEach((item) => {
          const s = getItemState(item.id);
          const card = document.createElement("article");
          card.className = "item" + (s.checked ? " done" : "");

          const row = document.createElement("div");
          row.className = "row";

          const check = document.createElement("input");
          check.className = "check";
          check.type = "checkbox";
          check.checked = !!s.checked;
          check.addEventListener("change", () => {
            getItemState(item.id).checked = check.checked;
            saveState();
            render();
          });

          const label = document.createElement("div");
          label.className = "label";
          label.textContent = item.text;

          const moods = document.createElement("div");
          moods.className = "moods";

          const moodDefs = [
            { key: "bad", text: "☹", title: "Verdrietig", cls: "bad" },
            { key: "neutral", text: "😐", title: "Neutraal", cls: "neutral" },
            { key: "good", text: "☺", title: "Lachend", cls: "good" }
          ];

          moodDefs.forEach((m) => {
            const b = document.createElement("button");
            b.type = "button";
            b.className = "mood " + m.cls + (s.mood === m.key ? " active " + m.cls : "");
            b.textContent = m.text;
            b.title = m.title;
            b.setAttribute("aria-pressed", s.mood === m.key ? "true" : "false");
            b.addEventListener("click", () => {
              const st = getItemState(item.id);
              st.mood = st.mood === m.key ? "" : m.key;
              saveState();
              render();
            });
            moods.appendChild(b);
          });

          const noteBtn = document.createElement("button");
          noteBtn.type = "button";
          noteBtn.className = "note-btn" + (s.note ? " has-note" : "");
          noteBtn.textContent = s.note ? "Notitie (1)" : "Notitie";
          noteBtn.addEventListener("click", () => openNote(item.id, item.text));

          row.appendChild(check);
          row.appendChild(label);
          row.appendChild(moods);
          row.appendChild(noteBtn);
          card.appendChild(row);
          w.appendChild(card);
        });

        root.appendChild(w);
      });
      updateProgress();
    }

    function updateProgress() {
      let totalItems = 0;
      let checkedItems = 0;
      schedule.forEach((week) => {
        week.items.forEach((item) => {
          totalItems += 1;
          if (getItemState(item.id).checked) checkedItems += 1;
        });
      });
      const pct = totalItems > 0 ? Math.round((checkedItems / totalItems) * 100) : 0;

      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressPct").textContent = pct + "%";
    }

    function openNote(id, label) {
      currentNoteId = id;
      const modal = document.getElementById("noteModal");
      const title = document.getElementById("noteTitle");
      const text = document.getElementById("noteText");
      title.textContent = "Notitie: " + label;
      text.value = getItemState(id).note || "";
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
      setTimeout(() => text.focus(), 20);
    }

    function closeNote() {
      const modal = document.getElementById("noteModal");
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
      currentNoteId = null;
    }

    document.getElementById("saveNote").addEventListener("click", () => {
      if (!currentNoteId) return;
      getItemState(currentNoteId).note = document.getElementById("noteText").value.trim();
      saveState();
      closeNote();
      render();
    });

    document.getElementById("clearNote").addEventListener("click", () => {
      if (!currentNoteId) return;
      getItemState(currentNoteId).note = "";
      saveState();
      closeNote();
      render();
    });

    document.getElementById("cancelNote").addEventListener("click", closeNote);
    document.getElementById("noteModal").addEventListener("click", (e) => {
      if (e.target.id === "noteModal") closeNote();
    });

    document.getElementById("syncCode").addEventListener("input", (e) => {
      syncCode = sanitizeSyncCode(e.target.value);
      e.target.value = syncCode;
      saveSyncCode();
    });

    document.getElementById("syncCode").addEventListener("change", async () => {
      if (!isValidSyncCode(syncCode)) return;
      try {
        const loaded = await pullStateFromCloud(true);
        if (!loaded) {
          setSyncNote("Nieuwe sync code klaar. Vul schema in en vink af; sync start automatisch.", true);
        }
      } catch (_) {
        setSyncNote("Cloud laden mislukt.");
      }
    });

    document.getElementById("syncLoadBtn").addEventListener("click", async () => {
      if (!isValidSyncCode(syncCode)) {
        setSyncNote("Vul eerst een geldige 6-cijferige sync code.");
        return;
      }
      try {
        await pullStateFromCloud(true);
      } catch (_) {
        setSyncNote("Cloud laden mislukt.");
      }
    });

    async function init() {
      render();
      if (isValidSyncCode(syncCode)) {
        try {
          await pullStateFromCloud(false);
        } catch (_) {
          // stil falen bij opstart
        }
      }
    }

    init();
  </script>
</body>
</html>
